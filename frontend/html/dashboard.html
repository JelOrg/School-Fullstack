<!doctype html>
<html lang="en">
  <head>
    <title>Dashboard</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="../css/bootstrap.css" />
    <link rel="stylesheet" href="../css/main.css" />
    <link rel="stylesheet" href="../css/dashboard.css" />
  </head>

  <!-- Navbar -->
  <body>
    <header
      class="navbar navbar-expand-lg navbar-light bg-light sticky-top shadow-sm"
    >
      <div class="container-fluid">
        <!-- Logo -->
        <a class="navbar-brand d-flex align-items-center" href="/dashboard">
          <img
            src="../img/rkz-logo.jif"
            alt="Logo"
            width="30"
            height="30"
            class="me-2"
          />
          <span class="fw-bold">RKZ Voorraad</span>
        </a>

        <!-- Hamburger button (VERY IMPORTANT) -->
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
          aria-controls="navbarNav"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <!-- Collapsible content -->
        <div class="collapse navbar-collapse" id="navbarNav">
          <!-- Left side links -->
          <ul class="navbar-nav me-auto mb-2 mb-lg-0">
            <li class="nav-item">
              <a class="nav-link active" href="dashboard">Dashboard</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="aanvragen">Aanvraag</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="totale-voorraad">Totale Voorraad</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="statistieken">Statistieken</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="geschiedenis">Geschiedenis</a>
            </li>
          </ul>

          <!-- NOT FUNCTIONAL -->
          <!-- Right side utilities -->
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link" href="profile">Profiel</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="settings">Instellingen</a>
            </li>
            <li class="nav-item">
              <a class="nav-link text-danger" href="login">Log Out</a>
            </li>
          </ul>
          <!-- NOT FUNCTIONAL -->
        </div>
      </div>
    </header>

    <!-- Main Dashboard interface -->

    <main class="py-4 px-1 container-fluid ">

    <main class="py-4 px-1 container-fluid">
    

      <div class="container-fluid px-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
          <h2 class="mb-0">Dashboard</h2>
        </div>

        <div class="row g-4">
          <!-- LEFT: Spoedaanvraag -->
          <div class="col-lg-3">
            <section class="card shadow-lg border-0 spoed-card h-100">
              <div class="card-header spoed-header text-white">
                <h5 class="mb-0">Spoedaanvraag</h5>
                <small>Hoogste prioriteit</small>
              </div>

              <div class="card-body">
                <label class="form-label">Zoek supplies</label>
                <div style="position:relative">
                  <input id="spoed-zoek"
                    class="form-control mb-3"
                    placeholder="Zoek op naam of categorie"
                    autocomplete="off"
                  />
                  <div id="spoed-suggestions"></div>
                </div>

                <label class="form-label">Afdeling</label>
                <input id="spoed-afdeling"
                  class="form-control mb-3"
                  placeholder="Bijv. SEH, Cardiologie"
                />

                <label class="form-label">Noodsituatie</label>
                <textarea id="spoed-situatie"
                  class="form-control mb-3"
                  rows="4"
                  placeholder="Beschrijf kort de noodsituatie"
                ></textarea>

                <button id="btn-spoed-versturen" class="btn btn-light w-100 fw-bold">
                  Spoedaanvraag versturen
                </button>
              </div>
            </section>
          </div>

          <!-- MIDDLE: Kritieke voorraad -->
          <div class="col-lg-6">
            <section class="card shadow border-0 h-100">
              <div class="card-header bg-white">
                <h5 class="mb-0">Kritiek Voorraadoverzicht</h5>
              </div>

              <div class="card-body" id="critical-stock-list">
                <div class="row mb-3">
                  <div class="col">
                    <select class="form-select">
                      <option>Alle voorraadniveaus</option>
                    </select>
                  </div>
                  <div class="col">
                    <select class="form-select">
                      <option>Alle categorieën</option>
                    </select>
                  </div>
                </div>
                <p class="text-muted small static-placeholder">Laden...</p>
              </div>
            </section>
          </div>

          <!-- RIGHT: Meldingen -->
          <div class="col-lg-3">
            <section class="card shadow border-0 h-100">
              <div class="card-header bg-white d-flex justify-content-between">
                <h5 class="mb-0">Meldingen</h5>
                <span class="badge bg-danger" id="notif-badge">0</span>
              </div>

              <div class="card-body">
                <div class="card-body">
                  <!-- Filters -->
                  <div class="mb-3">
                    <label class="form-label small">Type melding</label>
                    <select class="form-select form-select-sm mb-2">
                      <option>Alle meldingen</option>
                      <option>Spoed</option>
                      <option>Kritieke voorraad</option>
                    </select>

                    <label class="form-label small">Sorteren</label>
                    <select class="form-select form-select-sm">
                      <option>Nieuwste eerst</option>
                      <option>Oudste eerst</option>
                    </select>
                  </div>

                  <hr />
                  <div id="notifications-list">
                    <p class="text-muted small text-center">Laden...</p>
                  </div>
                </div>
              </div>
            </section>
          </div>
        </div>
      </div>
    </main>

    <!-- footer/legal section of site -->
    <footer class="text-center">
      <p>&copy; 2024 RKZ Voorraadbeheer. Alle rechten voorbehouden.</p>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../javascript/dashboard.js"></script>
  </body>
</html>
